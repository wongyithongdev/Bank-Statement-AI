version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: bankstatement-api:latest
    container_name: bankstatement-api
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      # Docker socket — allows API to start worker containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared file storage for uploads and outputs
      - /data/bankstatement:/data/bankstatement
    environment:
      POSTGRES_HOST: "10.0.10.63"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "root"
      POSTGRES_USER: "root"
      POSTGRES_PASSWORD: "root"
      AUTH_SERVER_URL: "http://auth2.my365biz.com"
      WORKER_IMAGE: "bankstatement-worker:latest"
      DATA_DIR: "/data/bankstatement"
      OBJECT_SERVER_API_KEY: "b729879ca8881e9a7b986e143e541219d43e0e36ca183529f34aa31ac007c39c"
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
